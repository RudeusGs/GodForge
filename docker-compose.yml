services:
    postgres:
        image: postgres:16-alpine
        environment:
            POSTGRES_USER: godforge_user
            POSTGRES_PASSWORD: godforge_password
            POSTGRES_DB: godforge_db
        ports:
            - "5432:5432"
        volumes:
            - godforge_postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U godforge_user -d godforge_db"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - godforge_network

    redis:
        image: redis:7-alpine
        ports:
            - "6379:6379"
        volumes:
            - godforge_redis_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - godforge_network

    rabbitmq:
        image: rabbitmq:3-management-alpine
        environment:
            RABBITMQ_DEFAULT_USER: godforge_user
            RABBITMQ_DEFAULT_PASS: godforge_password
        ports:
            - "5672:5672"
            - "15672:15672"
        volumes:
            - godforge_rabbitmq_data:/var/lib/rabbitmq
        healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - godforge_network

    minio:
        image: minio/minio:latest
        environment:
            MINIO_ROOT_USER: godforge_user
            MINIO_ROOT_PASSWORD: godforge_password
        command: server /data --console-address ":9001"
        ports:
            - "9000:9000"
            - "9001:9001"
        volumes:
            - godforge_minio_data:/data
        healthcheck:
            test:
                ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - godforge_network

networks:
    godforge_network:
        driver: bridge

volumes:
    godforge_postgres_data:
    godforge_redis_data:
    godforge_rabbitmq_data:
    godforge_minio_data:

