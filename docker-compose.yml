name: godforge

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-godforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-godforge_local_password}
      POSTGRES_DB: ${POSTGRES_DB:-godforge}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - godforge_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-godforge} -d ${POSTGRES_DB:-godforge}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [godforge_network]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - godforge_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [godforge_network]

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-godforge}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-godforge_local_password}
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - godforge_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [godforge_network]

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-godforge}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-godforge_local_password}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - godforge_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [godforge_network]

  forgejo-db:
    image: postgres:16-alpine
    profiles: ["hosted-git"]
    environment:
      POSTGRES_USER: ${FORGEJO_DB_USER:-forgejo}
      POSTGRES_PASSWORD: ${FORGEJO_DB_PASSWORD:-forgejo_local_password}
      POSTGRES_DB: ${FORGEJO_DB_NAME:-forgejo}
    volumes:
      - forgejo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${FORGEJO_DB_USER:-forgejo} -d ${FORGEJO_DB_NAME:-forgejo}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [godforge_network]

  forgejo:
    image: codeberg.org/forgejo/forgejo:11-rootless
    profiles: ["hosted-git"]
    depends_on:
      forgejo-db:
        condition: service_healthy
    environment:
      USER_UID: 1000
      USER_GID: 1000
      FORGEJO__database__DB_TYPE: postgres
      FORGEJO__database__HOST: forgejo-db:5432
      FORGEJO__database__NAME: ${FORGEJO_DB_NAME:-forgejo}
      FORGEJO__database__USER: ${FORGEJO_DB_USER:-forgejo}
      FORGEJO__database__PASSWD: ${FORGEJO_DB_PASSWORD:-forgejo_local_password}
      FORGEJO__server__ROOT_URL: http://localhost:${FORGEJO_HTTP_PORT:-3000}/
      FORGEJO__server__SSH_PORT: ${FORGEJO_SSH_PORT:-2222}
      FORGEJO__service__DISABLE_REGISTRATION: "true"
    ports:
      - "${FORGEJO_HTTP_PORT:-3000}:3000"
      - "${FORGEJO_SSH_PORT:-2222}:2222"
    volumes:
      - forgejo_data:/var/lib/gitea
      - forgejo_config:/etc/gitea
    networks: [godforge_network]

networks:
  godforge_network:
    driver: bridge

volumes:
  godforge_postgres_data:
  godforge_redis_data:
  godforge_rabbitmq_data:
  godforge_minio_data:
  forgejo_postgres_data:
  forgejo_data:
  forgejo_config:
